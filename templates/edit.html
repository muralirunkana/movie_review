<!DOCTYPE html>
<html>
<head>
    <title>Edit Review</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>✏️ Edit Movie Review</h1>
        <form method="POST">
            <input type="text" name="title" value="{{ review.title }}" required><br>
            <textarea name="description" required>{{ review.description }}</textarea><br>
            <textarea name="review" required>{{ review.review }}</textarea><br>

            <label for="rating">⭐ Rating:</label>
            <select name="rating" required>
                <option value="⭐" {% if review.rating == "⭐" %}selected{% endif %}>⭐</option>
                <option value="⭐⭐" {% if review.rating == "⭐⭐" %}selected{% endif %}>⭐⭐</option>
                <option value="⭐⭐⭐" {% if review.rating == "⭐⭐⭐" %}selected{% endif %}>⭐⭐⭐</option>
                <option value="⭐⭐⭐⭐" {% if review.rating == "⭐⭐⭐⭐" %}selected{% endif %}>⭐⭐⭐⭐</option>
                <option value="⭐⭐⭐⭐⭐" {% if review.rating == "⭐⭐⭐⭐⭐" %}selected{% endif %}>⭐⭐⭐⭐⭐</option>
            </select><br>

            <button type="submit">Update</button>
        </form>
        <a href="/">← Back</a>
    </div>
</body>
</html>
