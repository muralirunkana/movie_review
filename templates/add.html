<!DOCTYPE html>
<html>
<head>
    <title>Add Review</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>➕ Add a Movie Review</h1>
        <form method="POST">
            <input type="text" name="title" placeholder="🎬 Movie Title" required><br>
            <textarea name="description" placeholder="📝 Description" required></textarea><br>
            <textarea name="review" placeholder="⭐ Your Review" required></textarea><br>
            
            <label for="rating">⭐ Rating:</label>
            <select name="rating" required>
                <option value="">Select Rating</option>
                <option value="⭐">⭐</option>
                <option value="⭐⭐">⭐⭐</option>
                <option value="⭐⭐⭐">⭐⭐⭐</option>
                <option value="⭐⭐⭐⭐">⭐⭐⭐⭐</option>
                <option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐</option>
            </select><br>
        
            <button type="submit">Submit</button>
        </form>
        <a href="/" style="background-color: lightblue; padding: 8px 12px; font-size: 18px;">← Back</a>
        
    </div>
</body>
</html>
